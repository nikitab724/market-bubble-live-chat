<!doctype html>
<html lang="en" class="admin-root">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Bubble Admin</title>
    <link rel="icon" href="/assets/market-bubble-logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <header class="admin-header">
        <div class="admin-brand">
          <img class="admin-brand-logo" src="../assets/market-bubble-logo.jpg" alt="" />
          <span class="admin-brand-name">Market Bubble</span>
        </div>
        <div class="admin-heading">
          <p>Admin Dashboard</p>
          <h1>Profile Manager</h1>
        </div>
      </header>

      <section id="loginPanel" class="admin-panel" hidden>
        <form id="loginForm" class="admin-login">
          <label for="adminPassword">Password</label>
          <div class="admin-login-row">
            <input id="adminPassword" name="password" type="password" autocomplete="current-password" required />
            <button type="submit">Unlock</button>
          </div>
        </form>
      </section>

      <section id="editorPanel" class="admin-panel" hidden>
        <div class="admin-actions">
          <button id="addProfileButton" type="button">Add Profile</button>
          <button id="saveSourcesButton" type="button">Save Profiles</button>
          <button id="logoutButton" type="button">Logout</button>
        </div>
        <details id="bridgeTokenPanel" class="admin-bridge-token">
          <summary>X Bridge token</summary>
          <p>Paste this into the Market Bubble X Bridge extension popup. It authorizes the extension to send X chat; without it the backend rejects bridged chat. Treat it like a password.</p>
          <div class="admin-bridge-token-row">
            <input id="bridgeToken" type="password" readonly value="" aria-label="X Bridge token" />
            <button id="revealBridgeToken" type="button">Show</button>
            <button id="copyBridgeToken" type="button">Copy</button>
          </div>
        </details>
        <div id="profileCards" class="profile-editor"></div>
      </section>

      <p id="adminStatus" class="admin-status" role="status"></p>
    </main>

    <script type="module" src="./admin.mjs"></script>
  </body>
</html>
