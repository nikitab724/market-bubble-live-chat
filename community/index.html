<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Bubble — Community</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23090b0f"/><text x="32" y="40" text-anchor="middle" font-family="Arial" font-size="22" font-weight="900" fill="%2317a7ff">MB</text></svg>' />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles-v2.css" />
  </head>
  <body class="v2-community-page">

    <header class="v2-topbar">
      <div class="v2-tagline" aria-label="Market Bubble tagline">
        <span>Make Money</span>
        <span>Command Attention</span>
        <span>Leverage AI</span>
      </div>

      <nav class="v2-nav" aria-label="Site navigation">
        <a href="/v2">Live</a>
        <span aria-hidden="true">•</span>
        <a href="/content">Content</a>
        <span aria-hidden="true">•</span>
        <a href="/community" aria-current="page">Community</a>
      </nav>

      <div class="v2-wordmark">
        <img src="/assets/logo.png" alt="Market Bubble" class="v2-wordmark-logo" />
      </div>
    </header>

    <main class="v2-community-main">
      <div class="v2-community-split">

        <!-- Left 2/3: MarketBubble posts -->
        <section class="v2-community-column v2-community-column--feed" aria-label="Market Bubble posts">
          <div class="v2-community-col-header">
            <h1 class="v2-content-title">Posts</h1>
            <p class="v2-content-subtitle">
              <a href="https://x.com/marketbubble" target="_blank" rel="noopener">@marketbubble</a>
              on X
            </p>
          </div>
          <div class="v2-community-embed-wrap">
            <a
              class="twitter-timeline"
              data-theme="dark"
              data-chrome="noheader nofooter noborders transparent"
              href="https://twitter.com/marketbubble"
            >Loading posts…</a>
          </div>
        </section>

        <!-- Right 1/3: Mentions -->
        <section class="v2-community-column v2-community-column--mentions" aria-label="Community mentions">
          <div class="v2-community-col-header">
            <h1 class="v2-content-title">Mentions</h1>
            <p class="v2-content-subtitle">Community posts about @marketbubble</p>
          </div>
          <div class="v2-community-embed-wrap">
            <a
              class="twitter-timeline"
              data-theme="dark"
              data-chrome="noheader nofooter noborders transparent"
              href="https://twitter.com/search?q=%40marketbubble+lang%3Aen&src=typed_query&f=live"
            >Loading mentions…</a>
          </div>
        </section>

      </div>
    </main>

    <footer class="v2-footer">
      <span class="v2-footer-quote">"If no one sees the vision, go alone"</span>
      <div class="v2-footer-center">
        <span class="v2-footer-schedule">Live • Thursdays • 1PM PST</span>
        <div class="v2-footer-socials">
          <a href="https://www.twitch.tv/fazebanks" target="_blank" rel="noopener" aria-label="Twitch">
            <img src="/assets/twitch-icon.png" alt="Twitch" class="v2-social-icon" />
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="Spotify">
            <img src="/assets/spotify-icon.png" alt="Spotify" class="v2-social-icon" />
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="TikTok">
            <img src="/assets/tiktok-icon.png" alt="TikTok" class="v2-social-icon" />
          </a>
          <a href="#" target="_blank" rel="noopener" aria-label="X">
            <img src="/assets/x-icon.png" alt="X" class="v2-social-icon" />
          </a>
        </div>
      </div>
      <span class="v2-footer-sponsor">Presented by Polymarket</span>
    </footer>

    <script type="module" src="/community/community.mjs"></script>
  </body>
</html>
