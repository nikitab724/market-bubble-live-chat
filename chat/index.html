<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Bubble Shared Chat</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23090b0f"/><text x="32" y="40" text-anchor="middle" font-family="Arial" font-size="22" font-weight="900" fill="%2317a7ff">MB</text></svg>' />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="app-shell chat-shell">
      <section class="chat-view" aria-label="Combined live chat">
        <header class="chat-header">
          <div class="brand-mark chat-brand" aria-hidden="true">
            <span>Market</span>
            <span>Bubble</span>
          </div>
          <div class="chat-title">
            <p>Market Bubble Shared Chat</p>
            <h1>Twitch + Kick + X + MarketBubble.com</h1>
          </div>
          <div class="viewer-counter" aria-label="Combined viewers">
            <strong id="viewerCount">0</strong>
            <span>Viewers</span>
          </div>
          <div id="sourceBreakdown" class="source-breakdown" aria-label="Viewer sources"></div>
        </header>

        <div id="chatFeed" class="chat-feed" role="log" aria-live="polite"></div>
        <button id="jumpToLive" class="jump-to-live" type="button" hidden>Jump to live</button>
      </section>
    </main>

    <script type="module" src="../src/app.mjs?v=20260606-scroll-firewall"></script>
  </body>
</html>
